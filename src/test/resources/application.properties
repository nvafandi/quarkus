# Quarkus Sales System - Test Configuration

# Database Configuration - H2 for testing
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:sales_test;DB_CLOSE_DELAY=-1

# Hibernate ORM - drop-and-create for clean test state
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Disable OIDC for tests
quarkus.oidc.enabled=false

# Disable Keycloak dev services
quarkus.keycloak.devservices.enabled=false
