# Quarkus Sales System Configuration

# Application
quarkus.application.name=sales-system

# HTTP Configuration
quarkus.http.port=8080

# Database Configuration - PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:nurvan}
quarkus.datasource.password=${DB_PASSWORD:changeme}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/sales_db}
quarkus.datasource.jdbc.max-size=16
quarkus.datasource.jdbc.min-size=4

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# CORS Configuration (optional, for frontend integration)
# quarkus.http.cors=true
# quarkus.http.cors.origins=*

# OpenAPI / Swagger UI Configuration
quarkus.smallrye-openapi.store-schema-directory=target/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
